# Default values for faaast-registry.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: fraunhoferiosb/faaast-registry
  tag: latest
  pullPolicy: IfNotPresent

fullnameOverride: "faaast-registry"

autoscaling:
  enabled: false
serviceAccount:
  create: false

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: "localhost"
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# FA³ST Registry is a Spring-based application
# The following is to configure FA³ST Registry

# https://faaast-registry.readthedocs.io/en/latest/gettingstarted/gettingstarted.html#command-line-interface-cli
# Possible values: q (quiet, only ERROR), v (verbose, INFO/WARN), vv (DEBUG/INFO), vvv (TRACE/DEBUG)
# Important: Don't prefix a dash ("-")
logLevel: v

# Spring Boot server settings (application.properties: server.*)
server:
  port: 8090                            # server.port
  servlet:
    contextPath: ""            # server.servlet.context-path
  error:
    includeMessage: "always"            # server.error.include-message

  ssl:
    enabled: false                       # server.ssl.enabled
    bundle:
      name: "service"                   # server.ssl.bundle
      jks:
        service:
          key:
            alias: "server"             # spring.ssl.bundle.jks.service.key.alias
          keystore:
            location: "classpath:keystore.p12"  # spring.ssl.bundle.jks.service.keystore.location
            password: "password"                # spring.ssl.bundle.jks.service.keystore.password
            type: "PKCS12"                      # spring.ssl.bundle.jks.service.keystore.type

# CORS configuration (application.properties: cors.*)
  cors:
    enabled: false
    allowedOrigins: "*"
    allowedMethods: "GET, HEAD, POST"
    allowedHeaders: "*"

# Persistence configuration (application.properties: spring.*)
spring:
  profiles:
    active: "jpa"
  jpa:
    # Common JPA settings
    orm: "orm.xml"
    showSql: false
    openInView: true
    hibernate:
      ddlAuto: "update"
    properties:
      hibernate:
        formatSql: true

    datasource:
        driver: "org.h2.Driver"
        url: "jdbc:h2:mem:testdb"
        username: "sa"
        password: ""

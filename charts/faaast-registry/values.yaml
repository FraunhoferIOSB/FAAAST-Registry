# Default values for faaast-registry.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: fraunhoferiosb/faaast-registry
  tag: 1.1.0
  pullPolicy: IfNotPresent

fullnameOverride: "faaast-registry"

autoscaling:
  enabled: false
serviceAccount:
  create: false

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: "localhost"
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# FA³ST Registry is a Spring-based application
# The following is to configure FA³ST Registry

# Spring Boot server settings
server:
  port: 8090                      # server.port
  sslEnabled: true                # server.ssl.enabled
  contextPath: "/api/v3.0"        # server.servlet.context-path

# CORS configuration
cors:
  enabled: false                  # cors.enabled
  allowedOrigins: "*"             # cors.allowedOrigins
  allowedMethods: "GET, POST"     # cors.allowedMethods
  allowedHeaders: "*"             # cors.allowedHeaders
  exposedHeaders: ""              # cors.exposedHeaders (empty = not set)
  maxAge: 1800                    # cors.maxAge (seconds)

# SSL bundle (optional Spring SSL bundle support)
sslBundle:
  enabled: false                  # if true, set server.ssl.bundle + bundle props
  bundleName: "service"           # server.ssl.bundle
  keyAlias: "server"              # spring.ssl.bundle.jks.service.key.alias
  keystore:
    location: "classpath:keystore.p12"  # spring.ssl.bundle.jks.service.keystore.location
    password: "password"                # spring.ssl.bundle.jks.service.keystore.password
    type: "PKCS12"                      # spring.ssl.bundle.jks.service.keystore.type

# Persistence configuration
persistence:
  # mode: "in-memory" → spring.profiles.active not set/empty
  # mode: "jpa"       → spring.profiles.active=jpa and JPA properties applied
  mode: "in-memory"

  jpa:
    # Common JPA settings (largely matching the repo defaults)
    orm: "orm.xml"                        # spring.jpa.orm
    formatSql: true                       # spring.jpa.properties.hibernate.format_sql
    ddlAuto: "update"                     # spring.jpa.hibernate.ddl-auto
    openInView: true                      # spring.jpa.open-in-view
    showSql: false                        # spring.jpa.show-sql

    # Choose one of the profile-specific blocks below per environment

    # PostgreSQL settings
    postgres:
      enabled: false
      dialect: "org.hibernate.dialect.PostgreSQLDialect"   # spring.jpa.properties.hibernate.dialect
      driverClassName: "org.postgresql.Driver"             # spring.datasource.driver
      url: "jdbc:postgresql://postgres:5432/fa3st-registry" # spring.datasource.url
      username: "fa3st-registry"                           # spring.datasource.username
      password: "ChangeMe"                                 # spring.datasource.password

    # H2 in‑memory DB (for local/dev)
    h2:
      enabled: false
      dialect: "org.hibernate.dialect.H2Dialect"           # spring.jpa.properties.hibernate.dialect
      driverClassName: "org.h2.Driver"                     # spring.datasource.driver
      url: "jdbc:h2:mem:testdb"                            # spring.datasource.url
      username: "sa"                                       # spring.datasource.username
      password: ""                                         # spring.datasource.password
